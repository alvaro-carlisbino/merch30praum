<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="w-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3a1018"/>
      <stop offset="60%" stop-color="#1a0a10"/>
      <stop offset="100%" stop-color="#0a040a"/>
    </linearGradient>
    <radialGradient id="w-rose" cx="68%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#e8a3a8" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#c8506a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a0a10" stop-opacity="0"/>
    </radialGradient>
    <filter id="w-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2"/>
      <feColorMatrix values="0 0 0 0 0.95  0 0 0 0 0.91  0 0 0 0 0.89  0 0 0 0.22 0"/>
    </filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#w-bg)"/>
  <rect width="1000" height="1000" fill="url(#w-rose)"/>

  <!-- top label: chapter -->
  <g font-family="Cormorant Garamond, Georgia, serif" fill="#f4e8e4">
    <text x="500" y="120" text-anchor="middle" font-size="16" letter-spacing="14" opacity="0.7">CAPÍTULO II · COM TETO</text>
  </g>

  <!-- big italic title COLAPSO -->
  <text x="500" y="490" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif" font-size="240"
        font-style="italic" font-weight="500" fill="#f4e8e4" letter-spacing="-6">
    Colapso
  </text>
  <text x="500" y="640" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif" font-size="120"
        font-style="italic" font-weight="400" fill="#c8506a" letter-spacing="2">
    global
  </text>

  <!-- ornament rule -->
  <line x1="380" y1="700" x2="620" y2="700" stroke="#c8506a" stroke-width="1.4" opacity="0.7"/>

  <!-- bottom signatures -->
  <g font-family="Cormorant Garamond, Georgia, serif" fill="#e8a3a8">
    <text x="500" y="780" text-anchor="middle" font-size="38" font-style="italic">Wiu × Teto</text>
    <text x="500" y="830" text-anchor="middle" font-size="14" letter-spacing="10" opacity="0.7">2024 · 30PRAUM</text>
  </g>

  <!-- vignette -->
  <radialGradient id="w-vignette" cx="50%" cy="55%" r="65%">
    <stop offset="55%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="1000" height="1000" fill="url(#w-vignette)"/>

  <!-- film grain -->
  <rect width="1000" height="1000" filter="url(#w-grain)" opacity="0.55" style="mix-blend-mode:soft-light"/>
</svg>
