<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wp-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2a1018"/>
      <stop offset="100%" stop-color="#0a0408"/>
    </linearGradient>
    <radialGradient id="wp-light" cx="48%" cy="34%" r="40%">
      <stop offset="0%" stop-color="#e8a3a8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a0a10" stop-opacity="0"/>
    </radialGradient>
    <filter id="wp-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2"/>
      <feColorMatrix values="0 0 0 0 0.95  0 0 0 0 0.91  0 0 0 0 0.89  0 0 0 0.25 0"/>
    </filter>
  </defs>

  <rect width="800" height="1000" fill="url(#wp-bg)"/>
  <rect width="800" height="1000" fill="url(#wp-light)"/>

  <!-- silhouette -->
  <g transform="translate(400 520)" fill="#0c0608" stroke="#c8506a" stroke-width="1.5" opacity="0.95">
    <!-- shoulders -->
    <path d="M -240 380 Q -190 220 -90 180 L 90 180 Q 190 220 240 380 Z"/>
    <!-- neck -->
    <rect x="-46" y="100" width="92" height="100" rx="12"/>
    <!-- head with curls -->
    <path d="M -150 100 Q -180 -40 -110 -180 Q -50 -260 0 -270 Q 50 -260 110 -180 Q 180 -40 150 100 Q 120 130 80 115 L -80 115 Q -120 130 -150 100 Z" fill="#0a0508"/>
    <!-- ear hint -->
    <ellipse cx="-148" cy="20" rx="8" ry="14" fill="#1a0a10"/>
    <ellipse cx="148" cy="20" rx="8" ry="14" fill="#1a0a10"/>
  </g>

  <!-- text overlays -->
  <g font-family="Cormorant Garamond, Georgia, serif" fill="#f4e8e4">
    <text x="40" y="60" font-size="14" letter-spacing="6" opacity="0.6">WIU</text>
    <text x="760" y="60" text-anchor="end" font-size="14" letter-spacing="6" opacity="0.6">FORTALEZA · CE</text>
    <text x="40" y="965" font-size="48" font-style="italic" font-weight="500" letter-spacing="-1">o último</text>
    <text x="40" y="1015" font-size="48" font-style="italic" font-weight="500" letter-spacing="-1">romântico</text>
  </g>

  <!-- ornament -->
  <line x1="40" y1="980" x2="200" y2="980" stroke="#c8506a" stroke-width="1" opacity="0.7"/>

  <!-- vignette -->
  <radialGradient id="wp-vig" cx="50%" cy="55%" r="65%">
    <stop offset="55%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.65"/>
  </radialGradient>
  <rect width="800" height="1000" fill="url(#wp-vig)"/>

  <rect width="800" height="1000" filter="url(#wp-grain)" opacity="0.5" style="mix-blend-mode:soft-light"/>
</svg>
