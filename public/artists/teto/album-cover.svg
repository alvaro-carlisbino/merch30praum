<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="t-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2a1d10"/>
      <stop offset="60%" stop-color="#14110d"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <filter id="t-kraft">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3"/>
      <feColorMatrix values="0 0 0 0 0.78  0 0 0 0 0.6  0 0 0 0 0.35  0 0 0 0.55 0"/>
    </filter>
    <filter id="t-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2"/>
      <feColorMatrix values="0 0 0 0 0.93  0 0 0 0 0.88  0 0 0 0 0.78  0 0 0 0.22 0"/>
    </filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#t-bg)"/>
  <rect width="1000" height="1000" filter="url(#t-kraft)" opacity="0.55"/>

  <!-- tape stripes (collage) -->
  <g opacity="0.82">
    <rect x="-30" y="120" width="280" height="56" fill="#ede5d6" opacity="0.18" transform="rotate(-4 110 148)"/>
    <rect x="710" y="60" width="320" height="60" fill="#c89858" opacity="0.32" transform="rotate(3 870 90)"/>
    <rect x="-60" y="780" width="350" height="58" fill="#ede5d6" opacity="0.14" transform="rotate(2 115 809)"/>
  </g>

  <!-- top label -->
  <text x="60" y="100" font-family="Archivo Black, Impact, system-ui" font-size="20" fill="#ede5d6" letter-spacing="10">TETO × WIU · 2024</text>

  <!-- huge title -->
  <g font-family="Archivo Black, Impact, system-ui" fill="#ede5d6">
    <text x="60" y="430" font-size="200" letter-spacing="-8">COLAPSO</text>
    <text x="60" y="620" font-size="200" letter-spacing="-8" fill="#c89858">GLOBAL</text>
  </g>

  <!-- stamp -->
  <g transform="translate(820 720) rotate(-8)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#c89858" stroke-width="3" opacity="0.7"/>
    <circle cx="0" cy="0" r="78" fill="none" stroke="#c89858" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="-10" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
          font-size="14" fill="#c89858" letter-spacing="2">ED. NUMERADA</text>
    <text x="0" y="14" text-anchor="middle" font-family="Archivo Black, Impact"
          font-size="34" fill="#c89858">100/100</text>
    <text x="0" y="40" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
          font-size="11" fill="#c89858" letter-spacing="3" opacity="0.7">30PRAUM · BR</text>
  </g>

  <!-- bottom monospace info -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#ede5d6" opacity="0.7">
    <text x="60" y="900" font-size="13" letter-spacing="4">NÃO É FIM. É TRILHA.</text>
    <text x="60" y="940" font-size="11" letter-spacing="3" opacity="0.6">CORTE EM TIRAS · COLAGEM MANUAL · CARIMBO À MÃO</text>
  </g>

  <!-- noise overlay -->
  <rect width="1000" height="1000" filter="url(#t-grain)" opacity="0.65" style="mix-blend-mode:overlay"/>
</svg>
