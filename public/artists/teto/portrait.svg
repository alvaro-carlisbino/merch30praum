<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tp-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2a1d10"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <filter id="tp-kraft">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3"/>
      <feColorMatrix values="0 0 0 0 0.78  0 0 0 0 0.6  0 0 0 0 0.35  0 0 0 0.5 0"/>
    </filter>
  </defs>

  <rect width="800" height="1000" fill="url(#tp-bg)"/>
  <rect width="800" height="1000" filter="url(#tp-kraft)" opacity="0.55"/>

  <!-- silhouette with cap -->
  <g transform="translate(400 520)" fill="#100805" stroke="#c89858" stroke-width="1.5" opacity="0.95">
    <!-- shoulders -->
    <path d="M -250 380 Q -200 220 -100 180 L 100 180 Q 200 220 250 380 Z"/>
    <!-- neck -->
    <rect x="-50" y="100" width="100" height="100" rx="14"/>
    <!-- head + cap -->
    <path d="M -140 110 Q -170 -10 -110 -130 Q -50 -210 0 -220 Q 50 -210 110 -130 Q 170 -10 140 110 Q 120 140 80 125 L -80 125 Q -120 140 -140 110 Z" fill="#080503"/>
    <!-- cap brim -->
    <path d="M -210 -120 Q -120 -150 0 -150 Q 120 -150 210 -120 L 200 -100 Q 100 -125 0 -125 Q -100 -125 -200 -100 Z" fill="#0a0a08"/>
    <!-- cap top -->
    <path d="M -130 -120 Q -150 -200 -50 -230 Q 50 -245 130 -200 Q 150 -160 130 -120 Z" fill="#0a0a08"/>
  </g>

  <!-- collage tape -->
  <g opacity="0.7">
    <rect x="-20" y="50" width="220" height="40" fill="#c89858" opacity="0.4" transform="rotate(-4 90 70)"/>
    <rect x="600" y="930" width="240" height="40" fill="#ede5d6" opacity="0.18" transform="rotate(3 720 950)"/>
  </g>

  <!-- text -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#ede5d6">
    <text x="40" y="60" font-size="14" letter-spacing="5" opacity="0.7">TETO</text>
    <text x="760" y="60" text-anchor="end" font-size="14" letter-spacing="5" opacity="0.7">SP · BR</text>
  </g>
  <text x="40" y="970" font-family="Archivo Black, Impact, system-ui" font-size="56"
        fill="#ede5d6" letter-spacing="-2">COLAPSO</text>

  <!-- vignette -->
  <radialGradient id="tp-vig" cx="50%" cy="55%" r="65%">
    <stop offset="55%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.65"/>
  </radialGradient>
  <rect width="800" height="1000" fill="url(#tp-vig)"/>
</svg>
